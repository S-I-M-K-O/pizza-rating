<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#e74c3c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>🍕 Pizzeria Ratings</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍕 Pizzeria Ratings</h1>
            <p class="subtitle">Share your pizza experiences with friends!</p>
        </header>

        <main>
            <section class="rating-form-section">
                <div class="form-card">
                    <h2>✨ Add Your Rating</h2>
                    <form id="ratingForm">
                        <div class="form-group">
                            <label for="pizzeria">🍕 Pizzeria Name</label>
                            <input id="pizzeria" type="text" placeholder="Enter pizzeria name" required>
                            <small class="form-hint">Extra spaces will be removed automatically</small>
                        </div>

                        <div class="form-group">
                            <label for="reviewer">👤 Your Name</label>
                            <input id="reviewer" type="text" placeholder="Enter your name" required>
                        </div>

                        <div class="form-group">
                            <label for="score">⭐ Rating (1-6)</label>
                            <div class="rating-input">
                                <input id="score" type="number" min="1" max="6" placeholder="1-6" required>
                                <div class="rating-hint">1 = Poor, 6 = Excellent</div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="comment">💬 Comment (Optional)</label>
                            <textarea id="comment" placeholder="Share your thoughts about this pizzeria..." rows="3"></textarea>
                        </div>

                        <button type="submit" class="submit-btn">
                            <span class="btn-text">🚀 Submit Rating</span>
                            <span class="btn-loading" style="display: none;">⏳ Submitting...</span>
                        </button>
                    </form>
                </div>
            </section>

            <section class="ratings-section">
                <h2>📊 Current Ratings</h2>
                <div id="list" class="ratings-list">
                    <div class="loading">Loading ratings...</div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
